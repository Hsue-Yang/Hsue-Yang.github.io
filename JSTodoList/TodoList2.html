<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="container">
      <div class="row">
        <div class="col-md-12">
          <div class="card card-white">
            <div class="card-body">
              <form action="javascript:void(0);">
                <input
                  type="text"
                  class="form-control add-task"
                  placeholder="New Task..."
                />
              </form>
              <ul class="nav nav-pills todo-nav">
                <li role="presentation" class="nav-item all-task active">
                  <a href="#" class="nav-link">All</a>
                </li>
                <li role="presentation" class="nav-item active-task">
                  <a href="#" class="nav-link">Active</a>
                </li>
                <li role="presentation" class="nav-item completed-task">
                  <a href="#" class="nav-link">Completed</a>
                </li>
              </ul>
              <div class="todo-list">
                <div class="todo-item">
                  <div class="checker">
                    <span class=""><input type="checkbox" /></span>
                  </div>
                  <span>Create theme</span>
                  <a
                    href="javascript:void(0);"
                    class="float-right remove-todo-item"
                    ><i class="icon-close"></i
                  ></a>
                </div>
                <div class="todo-item">
                  <div class="checker">
                    <span class=""><input type="checkbox" /></span>
                  </div>
                  <span>Work on wordpress</span>
                  <a
                    href="javascript:void(0);"
                    class="float-right remove-todo-item"
                    ><i class="icon-close"></i
                  ></a>
                </div>

                <div class="todo-item">
                  <div class="checker">
                    <span class=""><input type="checkbox" /></span>
                  </div>
                  <span>Organize office main department</span>
                  <a
                    href="javascript:void(0);"
                    class="float-right remove-todo-item"
                    ><i class="icon-close"></i
                  ></a>
                </div>
                <div class="todo-item">
                  <div class="checker">
                    <span><input type="checkbox" /></span>
                  </div>
                  <span>Error solve in HTML template</span>
                  <a
                    href="javascript:void(0);"
                    class="float-right remove-todo-item"
                    ><i class="icon-close"></i
                  ></a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
